name: Generate PDF resume

on:
  push:
    branches:
      - master
    paths:
      - src/experiences.json
      - scripts/generate-pdf.py
      - scripts/resume.html.jinja2
      - .github/workflows/pdf.yml
  workflow_dispatch:

jobs:
  pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Generate PDF
        run: devbox run -- make pdf
        env:
          GOPATH: /home/runner/go
          SRC_DIR: ${{ github.workspace }}/src

      - name: Upload PDF as release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: resume-pdf
          name: Resume PDF
          files: src/pdfs/resume.pdf
